# ============================================================
# 物业管理系统 - Docker Compose 部署配置
# 用法：docker-compose up -d
# ============================================================

version: '3.8'

services:
  # -----------------------------------------------------------
  # MySQL 数据库
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: property-mysql
    restart: always
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Property@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-property_management}
      MYSQL_USER: ${MYSQL_USER:-property}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Property@2024}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/conf.d:/etc/mysql/conf.d
      - ../database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ../database/init-data.sql:/docker-entrypoint-initdb.d/02-init-data.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=500
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - property-network

  # -----------------------------------------------------------
  # Redis 缓存
  # -----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: property-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-PropertyRedis@2024} --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-PropertyRedis@2024}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - property-network

  # -----------------------------------------------------------
  # Spring Boot 后端
  # -----------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.backend
    container_name: property-backend
    restart: always
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-property_management}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-property}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-Property@2024}
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-PropertyRedis@2024}
      JWT_SECRET: ${JWT_SECRET:-propertyManagementSecretKey2024Prod}
      FILE_UPLOAD_DIR: /opt/property-management/upload/
      TZ: Asia/Shanghai
      JAVA_OPTS: "-Xms256m -Xmx512m -XX:+UseG1GC"
    volumes:
      - upload_data:/opt/property-management/upload/
      - backend_logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - property-network

  # -----------------------------------------------------------
  # Nginx - 管理员端前端 + 反向代理
  # -----------------------------------------------------------
  nginx-admin:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.admin
    container_name: property-nginx-admin
    restart: always
    ports:
      - "${ADMIN_PORT:-80}:80"
    volumes:
      - ./nginx-admin.conf:/etc/nginx/conf.d/default.conf
      - upload_data:/opt/property-management/upload/:ro
    depends_on:
      - backend
    networks:
      - property-network

  # -----------------------------------------------------------
  # Nginx - 业主端 H5 前端（可选，独立部署）
  # -----------------------------------------------------------
  nginx-owner:
    image: nginx:alpine
    container_name: property-nginx-owner
    restart: always
    ports:
      - "${OWNER_PORT:-8081}:80"
    volumes:
      - ./nginx-owner.conf:/etc/nginx/conf.d/default.conf
      - ../frontend/owner/dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - property-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  upload_data:
    driver: local
  backend_logs:
    driver: local

networks:
  property-network:
    driver: bridge
